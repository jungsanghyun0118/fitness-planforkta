<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>회원 전용 트레이닝 플랜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #0f1115;
            color: white;
            overflow-x: hidden;
        }
        /* 로그인 화면 */
        #loginScreen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f1115, #1a1d24);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }
        .login-box {
            width: 100%;
            max-width: 420px;
            background: #1b1f27;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        .login-box h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .login-box p {
            opacity: 0.7;
            margin-bottom: 25px;
        }
        .login-box input {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 14px;
            padding: 0 16px;
            font-size: 1rem;
            background: #2a2f39;
            color: white;
            margin-bottom: 15px;
        }
        .login-box button {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 14px;
            background: white;
            color: black;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .login-box button:hover {
            transform: translateY(-2px);
        }
        #error {
            margin-top: 12px;
            color: #ff6b6b;
            font-size: 0.95rem;
        }
        /* 메인 */
        .hero {
            min-height: 100svh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            background: radial-gradient(circle at top, #2d3444 0%, #0f1115 60%);
        }
        .hero-inner {
            width: 100%;
            max-width: 1000px;
        }
        .badge {
            display: inline-block;
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .hero h1 {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 25px;
        }
        .hero p {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 700px;
            margin: 0 auto;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 100px;
        }
        .section {
            margin-bottom: 80px;
        }
        .section-title {
            font-size: 2rem;
            margin-bottom: 25px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .card {
            background: #1b1f27;
            border-radius: 22px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .card h3 {
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        .card p {
            opacity: 0.8;
            line-height: 1.7;
        }
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .table {
            width: 100%;
            min-width: 700px;
            border-collapse: collapse;
            background: #1b1f27;
            border-radius: 20px;
            overflow: hidden;
        }
        .table th {
            background: #242936;
            padding: 16px;
            text-align: left;
        }
        .table td {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        .footer {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.5;
        }
        /* 모바일 */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 3rem;
            }
            .hero p {
                font-size: 1rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .section-title {
                font-size: 1.5rem;
            }
            .card {
                padding: 20px;
            }
            .table {
                min-width: 600px;
            }
            .login-box {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h1>회원 전용 페이지</h1>
        <p>비밀번호를 입력해주세요</p>
        <input type="password" id="passwordInput" placeholder="비밀번호 입력">
        <button onclick="login()">입장하기</button>
        <div id="error"></div>  
    </div>
</div>

<div id="content" style="display:none;">
    <section class="hero">
        <div class="hero-inner">
            <div class="badge">MEMBER ONLY</div>
            <h1>TRAINING<br>SYSTEM</h1>     
            <p>회원 맞춤형 운동 플랜, 식단, 수행 능력 분석 및 루틴 관리 페이지</p>
        </div>
    </section>

    <div class="container">
        <section class="section">
            <h2 class="section-title">회원 정보</h2>
            <div class="grid">
                <div class="card">             
                    <h3>현재 체중</h3>
                    <p>84kg</p>
                </div>
                <div class="card">
                    <h3>목표 체중</h3>
                    <p>78kg</p>
                </div>          
                <div class="card">
                    <h3>운동 빈도</h3>
                    <p>주 5~6회</p>
                </div>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">주간 루틴</h2>    
            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>요일</th>                      
                            <th>운동</th>
                            <th>강도</th>
                            <th>비고</th>
                        </tr>
                    </thead>              
                    <tbody>
                        <tr>
                            <td>월요일</td>
                            <td>하체</td>
                            <td>높음</td>      
                            <td>스쿼트 중심</td>
                        </tr>
                        <tr>
                            <td>화요일</td>                 
                            <td>가슴</td>
                            <td>중간</td>
                            <td>벤치프레스</td>
                        </tr>
                        <tr>     
                            <td>수요일</td>
                            <td>등</td>
                            <td>높음</td>
                            <td>데드리프트</td>         
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="section">
            <h2 class="section-title">식단 가이드</h2>
            <div class="grid">     
                <div class="card">
                    <h3>아침</h3>
                    <p>닭가슴살 + 오트밀 + 계란</p>
                </div>        
                <div class="card">
                    <h3>점심</h3>
                    <p>일반식 + 단백질 보충</p>
                </div>            
                <div class="card">
                    <h3>저녁</h3>
                    <p>탄수화물 조절 + 고단백</p>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        Created by 상현 PT
    </footer>
</div>

<script>
    /* 비밀번호 및 만료일 설정 */
    const PASSWORD = "PT2026"; // 원하는 비밀번호로 수정 가능
    const EXPIRE_DATE = "2026-12-31"; // 원하는 만료일로 수정 가능

    function login(){
        const now = new Date();
        const expire = new Date(EXPIRE_DATE);
        
        if(now > expire){
            document.body.innerHTML = `
            <div style="min-height:100vh; display:flex; justify-content:center; align-items:center; text-align:center; padding:20px; font-size:1.5rem;">
                페이지 이용 기간이 종료되었습니다.
            </div>`;
            return;
        }
        
        const input = document.getElementById("passwordInput").value;
        if(input === PASSWORD){
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("content").style.display = "block";
        } else {
            document.getElementById("error").innerText = "비밀번호가 올바르지 않습니다.";
        }
    }

    /* 엔터 로그인 */
    document.getElementById("passwordInput").addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            login();
        }
    });

    /* 우클릭 차단 */
    document.addEventListener("contextmenu", e => {
        e.preventDefault();
    });

    /* 개발자도구 단축키 차단 */
    document.addEventListener("keydown", function(e){
        if(e.key === "F12"){
            e.preventDefault();
        }
        if(e.ctrlKey && ["u","s","c"].includes(e.key.toLowerCase())){
            e.preventDefault();
        }
    });
</script>
</body>
</html>
